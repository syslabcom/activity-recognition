<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Activity Recognition</title>
    <link rel="stylesheet" href="./assets/styles.css">
  </head>
  <body>
    <main class="layout">
      <header class="hero">
        <p class="eyebrow">Plone activity recognition</p>
        <h1>Workflow-published activity data</h1>
        <p class="intro">
          This site exposes workflow results as both a readable HTML view and a
          stable JSON feed for external clients.
        </p>
      </header>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>Latest GitHub activity digest</h2>
            <p id="status-message" class="muted">Loading published data…</p>
          </div>
          <div class="links" id="endpoint-links"></div>
        </div>

        <dl class="meta-grid" id="latest-meta"></dl>

        <div class="summary-panel">
          <h3>Summary</h3>
          <pre id="summary-text" class="summary">Loading…</pre>
        </div>
      </section>

      <section class="panel">
        <h2>Archived runs</h2>
        <ul id="runs-list" class="runs-list">
          <li class="muted">Loading run history…</li>
        </ul>
      </section>
    </main>

    <script src="./assets/app.js" defer></script>
  </body>
</html>
