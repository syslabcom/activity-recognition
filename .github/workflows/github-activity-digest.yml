name: Publish GitHub Activity Digest

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'

permissions:
  contents: write

concurrency:
  group: github-activity-digest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout activity-recognition
        uses: actions/checkout@v4

      - name: Restore digest cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: github-activity-digest-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            github-activity-digest-${{ runner.os }}-

      - name: Generate GitHub activity digest
        id: digest
        uses: abensur/github-activity-digest@v1
        with:
          mode: organization
          organization: plone
          user: pilz
          days: '7'
          ai-provider: openai
          ai-model: o4-mini
          language: English
          max-repos: '500'
          only-public: 'false'
          only-private: 'false'
          archive-dir: archive
          output-format: both
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Publish digest data
        run: |
          python3 scripts/publish_github_activity_digest.py \
            --summary-file "${{ steps.digest.outputs.summary-file }}" \
            --upstream-json-file "${{ steps.digest.outputs.json-file }}" \
            --output-dir "docs/data" \
            --source-repository "abensur/github-activity-digest" \
            --source-action-ref "v1" \
            --mode "organization" \
            --organization "plone" \
            --user "pilz" \
            --days "7" \
            --ai-provider "openai" \
            --ai-model "o4-mini" \
            --language "English" \
            --max-repos "500" \
            --only-public "false" \
            --only-private "false" \
            --repos-processed "${{ steps.digest.outputs.repos-processed }}" \
            --active-repos "${{ steps.digest.outputs.active-repos }}"

      - name: Commit published data
        shell: bash
        run: |
          git add docs/data
          git diff --staged --quiet && {
            echo "No data changes to commit."
            exit 0
          }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update GitHub activity digest data"
          git push
